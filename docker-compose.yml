version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: sraosha
      POSTGRES_PASSWORD: sraosha
      POSTGRES_DB: sraosha
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sraosha"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://sraosha:sraosha@postgres:5432/sraosha
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "sraosha db && sraosha serve --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://sraosha:sraosha@postgres:5432/sraosha
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - api
      - redis
    command: celery -A sraosha.tasks.celery_app worker --loglevel=info --beat

volumes:
  postgres_data:
