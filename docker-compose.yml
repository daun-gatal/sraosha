# API, worker, and beat use the published app image from GHCR (same image as release workflow).
# Pull before first run: `docker compose pull`. UI: http://localhost:8000/app/
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: sraosha
      POSTGRES_PASSWORD: sraosha
      POSTGRES_DB: sraosha
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sraosha"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine

  api:
    image: ghcr.io/daun-gatal/sraosha:latest
    # Serves OpenAPI and the built SPA (`/` may redirect depending on app config; UI is under `/app/`).
    ports:
      - "8000:8000"
    # Optional: copy .sraosha.example → .sraosha beside this file for API_KEY, ENCRYPTION_KEY, etc.
    env_file:
      - path: .sraosha
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://sraosha:sraosha@postgres:5432/sraosha
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "sraosha db && sraosha serve --host 0.0.0.0 --port 8000"

  # Celery: one `beat` (periodic tasks) + one or more `worker` replicas (scale `worker`).
  worker:
    image: ghcr.io/daun-gatal/sraosha:latest
    env_file:
      - path: .sraosha
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://sraosha:sraosha@postgres:5432/sraosha
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - api
      - redis
    command: ["sraosha", "worker", "--loglevel", "info", "--hostname", "worker@%h"]

  beat:
    image: ghcr.io/daun-gatal/sraosha:latest
    env_file:
      - path: .sraosha
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://sraosha:sraosha@postgres:5432/sraosha
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - api
      - redis
    command: ["sraosha", "beat", "--loglevel", "info"]

volumes:
  postgres_data:
