<div class="server-row border border-gray-200 rounded-lg p-4 relative bg-gray-50/50">
  <button type="button" onclick="this.closest('.server-row').remove()"
          class="absolute top-3 right-3 text-gray-400 hover:text-red-500 transition-colors">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
  </button>
  <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
    <div>
      <label class="block text-xs font-medium text-gray-500 mb-1">Server Name</label>
      <input type="text" name="server_name[]" value="{{ server.name }}" placeholder="production"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>
    <div>
      <label class="block text-xs font-medium text-gray-500 mb-1">Type</label>
      <select name="server_type[]" onchange="updateServerFields(this.closest('.server-row'))"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
        {% for t in [
          "postgres", "mysql", "bigquery", "snowflake", "redshift",
          "databricks", "trino", "duckdb", "mssql", "athena",
          "clickhouse", "oracle", "vertica", "presto", "synapse",
          "denodo", "dremio", "motherduck", "db2", "spark",
          "fabric", "cloudsql", "dask",
        ] %}
        <option value="{{ t }}" {% if server.type == t %}selected{% endif %}>{{ t }}</option>
        {% endfor %}
      </select>
    </div>
    <div data-field="host">
      <label class="block text-xs font-medium text-gray-500 mb-1">Host</label>
      <input type="text" name="server_host[]" value="{{ server.host }}" placeholder="db.company.com"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>
    <div data-field="port">
      <label class="block text-xs font-medium text-gray-500 mb-1">Port</label>
      <input type="text" name="server_port[]" value="{{ server.port }}" placeholder="5432"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>
    <div data-field="database">
      <label class="block text-xs font-medium text-gray-500 mb-1">Database</label>
      <input type="text" name="server_database[]" value="{{ server.database }}" placeholder="warehouse"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>
    <div data-field="schema">
      <label class="block text-xs font-medium text-gray-500 mb-1">Schema</label>
      <input type="text" name="server_schema[]" value="{{ server.schema }}" placeholder="public"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>
    <div data-field="account" style="display:none">
      <label class="block text-xs font-medium text-gray-500 mb-1">Account</label>
      <input type="text" name="server_account[]" value="{{ server.account }}" placeholder="xy12345.us-east-1"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>
    <div data-field="warehouse" style="display:none">
      <label class="block text-xs font-medium text-gray-500 mb-1">Warehouse</label>
      <input type="text" name="server_warehouse[]" value="{{ server.warehouse }}" placeholder="COMPUTE_WH"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>
    <div data-field="role" style="display:none">
      <label class="block text-xs font-medium text-gray-500 mb-1">Role</label>
      <input type="text" name="server_role[]" value="{{ server.role }}" placeholder="SYSADMIN"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>
    <div data-field="catalog" style="display:none">
      <label class="block text-xs font-medium text-gray-500 mb-1">Catalog</label>
      <input type="text" name="server_catalog[]" value="{{ server.catalog }}" placeholder="hive"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>
    <div data-field="httpPath" style="display:none">
      <label class="block text-xs font-medium text-gray-500 mb-1">HTTP Path</label>
      <input type="text" name="server_httppath[]" value="{{ server.httpPath }}" placeholder="/sql/1.0/warehouses/abc123"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>
    <div data-field="project" style="display:none">
      <label class="block text-xs font-medium text-gray-500 mb-1">Project</label>
      <input type="text" name="server_project[]" value="{{ server.project }}" placeholder="my-gcp-project"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>
    <div data-field="dataset" style="display:none">
      <label class="block text-xs font-medium text-gray-500 mb-1">Dataset</label>
      <input type="text" name="server_dataset[]" value="{{ server.dataset }}" placeholder="analytics"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>
    <div data-field="location" style="display:none">
      <label class="block text-xs font-medium text-gray-500 mb-1">Location</label>
      <input type="text" name="server_location[]" value="{{ server.location }}" placeholder="us-east1"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>
    <div data-field="path" style="display:none">
      <label class="block text-xs font-medium text-gray-500 mb-1">Path</label>
      <input type="text" name="server_path[]" value="{{ server.path }}" placeholder="/data/warehouse.duckdb"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>
  </div>
</div>
<script>
if (typeof updateServerFields === 'function') {
  updateServerFields(document.querySelector('.server-row:last-child'));
}
</script>
